{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
    <h3>Login</h3>
    <form action="" method="post" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Login" class="btn btn-primary">
    </form>
    <br>
    <p>Don't have an account? <a href="{% url 'create_user' %}">Sign up</a></p>
{% endblock %}
