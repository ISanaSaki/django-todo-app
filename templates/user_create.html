{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}
    <h3>Sign Up</h3>
    <form action="" method="post" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Sign up" class="btn btn-primary">
    </form>
    <br>
    <p>Already have an account? <a href="{% url 'login_user' %}">Login</a></p>
{% endblock %}
